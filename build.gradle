/*
 * This file was generated by the Gradle 'init' task.
 */

plugins {
    id 'java-library'
    id 'maven-publish'
    id 'signing'
    id 'com.gradleup.nmcp' version '0.0.8'
}

repositories {
    mavenLocal()
    maven {
        url = uri('https://repo.maven.apache.org/maven2/')
    }
}

dependencies {
    api libs.org.bouncycastle.bcprov.jdk18on
    api libs.com.fasterxml.jackson.core.jackson.databind
    api libs.com.fasterxml.jackson.core.jackson.annotations
    api libs.com.fasterxml.jackson.datatype.jackson.datatype.jdk8
    api libs.com.fasterxml.jackson.datatype.jackson.datatype.jsr310
    api libs.com.squareup.okhttp3.okhttp.jvm
    api libs.org.slf4j.slf4j.api
    api libs.org.jetbrains.annotations
    api libs.javax.xml.bind.jaxb.api
    api libs.org.glassfish.jaxb.jaxb.runtime
    api 'com.google.code.findbugs:jsr305:3.0.2'
    api 'javax.annotation:javax.annotation-api:1.3.2'

    testImplementation libs.org.junit.jupiter
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher:1.10.2'
    testImplementation 'org.mockito:mockito-core:5.11.0'
    testImplementation 'org.mockito:mockito-junit-jupiter:5.11.0'
}

test {
    useJUnitPlatform()
    testLogging {
        events "passed", "skipped", "failed"
        exceptionFormat = "full"
    }
}

group = 'io.cheqi'
version = '1.2.0'
description = 'Cheqi SDK'
java.sourceCompatibility = JavaVersion.VERSION_11

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(11)
    }
    withJavadocJar()
    withSourcesJar()
}

publishing {
    publications {
        maven(MavenPublication) {
            from(components.java)
            
            pom {
                name = 'Cheqi SDK'
                description = 'End-to-end encrypted SDK for Cheqi receipt processing'
                url = 'https://github.com/cheqi-io/cheqi-sdk-java'
                
                licenses {
                    license {
                        name = 'MIT License'
                        url = 'https://opensource.org/licenses/MIT'
                        distribution = 'repo'
                    }
                }
                
                developers {
                    developer {
                        id = 'cheqi'
                        name = 'Cheqi'
                        email = 'info@cheqi.io'
                        organization = 'Cheqi'
                        organizationUrl = 'https://cheqi.io'
                    }
                }
                
                scm {
                    connection = 'scm:git:git://github.com/cheqi-io/cheqi-sdk-java.git'
                    developerConnection = 'scm:git:ssh://github.com:cheqi-io/cheqi-sdk-java.git'
                    url = 'https://github.com/cheqi-io/cheqi-sdk-java/tree/main'
                }
            }
        }
    }
}

signing {
    def signingKey = findProperty('signingKey')
    def signingPassword = findProperty('signingPassword')
    if (signingKey && signingPassword) {
        useInMemoryPgpKeys(signingKey, signingPassword)
        sign publishing.publications.maven
    }
    required = false  // Only sign when credentials are available
}

nmcp {
    publishAllProjectsProbablyBreakingProjectIsolation {
        username = findProperty('centralUsername') ?: System.getenv('CENTRAL_USERNAME')
        password = findProperty('centralToken') ?: System.getenv('CENTRAL_TOKEN')
        publicationType = "AUTOMATIC"
    }
}

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
}

tasks.withType(Javadoc) {
    options.encoding = 'UTF-8'
    options.addStringOption('Xdoclint:none', '-quiet')
    failOnError = false
}
