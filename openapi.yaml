    CheqiCreditNote:
      type: object
      properties:
        cheqiCreditNoteId:
          type: string
          description: The unique identifier of the Cheqi credit note
          example: CHQ-CN-12345678-123456-123456
        documentNumber:
          type: string
          description: "The document number of the credit note, given by the seller."
          example: CN-12356
        originatorDocumentReference:
          type: string
          description: The document number of the original purchase receipt this credit
            note refers to.
          example: RECEIPT-123456
        identifiers:
          type: array
          description: "The identifiers for the credit note, given by the seller,\
            \ for example order reference, transaction number"
          example: "ORD-12356, TRN-12356"
          items:
            $ref: "#/components/schemas/Identifier"
        issueDate:
          type: string
          description: The issue date of the credit note
          format: date-time
          example: 2024-01-01T00:00:00Z
        currency:
          type: string
          description: The currency of the credit note
          example: EUR
        creditNoteSubtotal:
          type: number
          description: "The subtotal of the credit note, calculated as the sum of\
            \ all line items before any overall credit note-level adjustments or taxes."
          example: 10.0
        totalBeforeTax:
          type: number
          description: "The total before tax of the credit note, including any overall\
            \ discounts or charges."
          example: 10.0
        totalTaxAmount:
          type: number
          description: The total tax amount of the credit note
          example: 10.0
        totalAmount:
          type: number
          description: The total amount of the credit note
          example: 10.0
        products:
          type: array
          description: The list of products included in the credit note. Must contain
            at least one product.
          items:
            $ref: "#/components/schemas/Product"
        discounts:
          type: array
          description: The list of discounts applied to the credit note on total credit
            note level.
          items:
            $ref: "#/components/schemas/Discount"
        charges:
          type: array
          description: The list of charges applied to the credit note on total credit
            note level.
          items:
            $ref: "#/components/schemas/Charge"
        taxes:
          type: array
          description: The list of taxes applied to the credit note
          items:
            $ref: "#/components/schemas/Tax"
        period:
          $ref: "#/components/schemas/Period"
        note:
          type: string
          description: A note included on the credit note.
          example: Refund for returned items
        sellingParty:
          $ref: "#/components/schemas/SellingParty"
        receivingParty:
          $ref: "#/components/schemas/ReceivingParty"
        verificationNonce:
          type: string
          description: The verification nonce of the credit note
      description: "Cheqi JSON credit note template object. This contains a complete\
        \ CheqiCreditNote structure with products, taxes, parties, and all credit\
        \ note details."
    CreditNoteTemplateResponse:
      type: object
      properties:
        ubl:
          type: string
          description: "UBL XML credit note template as a serialized XML string following\
            \ the CreditNote schema. See [UBL XML Credit Note Format](https://docs.cheqi.io/creditNote/ubl-format)\
            \ for the full structure and field reference."
        cheqi:
          $ref: "#/components/schemas/CheqiCreditNote"
    EncryptedCreditNoteInitiationRequest:
      type: object
      properties:
        cheqiReceiptId:
          type: string
          description: The Cheqi receipt ID for the original receipt
        publicKey:
          type: string
          description: The public key of the requesting device
        encryptedCreditNoteInitiationRequest:
          type: string
          description: The encrypted credit note initiation request payload
        encryptedSymmetricKey:
          type: string
          description: The AES symmetric key encrypted with the recipient's RSA public
            key
      description: Encrypted credit note initiation request
    EncryptedCreditNote:
      required:
      - encryptedCreditNote
      - encryptedCustomerAesKey
      - encryptedCustomerDetails
      - encryptedSymmetricKey
      - publicKey
      - supplierPartyId
      type: object
      properties:
        receiptFormats:
          type: array
          items:
            $ref: "#/components/schemas/ReceiptFormat"
        recipientId:
          type: string
          description: The recipient ID of the credit note
          example: UUID
        creditNoteId:
          type: string
          description: The credit note ID
          example: UUID
        originalReceiptId:
          type: string
          description: The original receipt ID
          example: UUID
        receiverType:
          $ref: "#/components/schemas/ReceiverType"
        encryptedCreditNote:
          type: string
          description: The encrypted credit note
          example: encryptedCreditNote
        encryptedSymmetricKey:
          type: string
          description: Base64-encoded device-specific encrypted symmetric key
        encryptedCustomerDetails:
          type: string
          description: Base64-encoded encrypted customer details.
        encryptedCustomerAesKey:
          type: string
          description: Base64-encoded encrypted customer details AES key
        finalHash:
          type: string
        publicKey:
          type: string
          description: Base64-encoded public key used to encrypt the request
        supplierPartyId:
          type: string
          description: Supplier party ID for storage
          format: uuid
      description: A set of encrypted credit notes
    EncryptedCreditNotesRequest:
      required:
      - encryptedCreditNotes
      - matchId
      - parentCheqiReceiptId
      - templateHash
      type: object
      properties:
        matchId:
          type: string
          description: The match id that you received during customer matching
          example: match_123456789
        parentCheqiReceiptId:
          type: string
          description: The parent Cheqi this credit note refers to
          example: CHQ-1234567-123456-123456
        encryptedCreditNotes:
          uniqueItems: true
          type: array
          description: A set of encrypted credit notes
          items:
            $ref: "#/components/schemas/EncryptedCreditNote"
        templateHash:
          type: string
          description: The hash of the credit note template
      description: Encrypted credit note request with device-specific encryption
    ReceiverType:
      type: string
      description: Type of receiver for this receipt
      example: WEBHOOK/DEVICE
      enum:
      - DEVICE
      - CLIENT_APPLICATION
      - COMPANY
    CreditNoteCreatedResponse:
      type: object
      properties:
