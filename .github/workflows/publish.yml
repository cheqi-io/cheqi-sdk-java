name: Publish cheqi-sdk to Maven Central

on:
  workflow_dispatch:  # Manual trigger
  push:
    tags:
      - 'v*'  # Trigger on tags like v1.0.0

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
      
      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      - name: Publish to Maven Central
        run: |
          ./gradlew publishAllPublicationsToCentralPortal --no-daemon
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_TOKEN: ${{ secrets.CENTRAL_TOKEN }}
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.GPG_PASSPHRASE }}

      - name: Summary
        run: |
          echo "✅ cheqi-sdk published to Maven Central!" >> $GITHUB_STEP_SUMMARY
          echo "Check status at: https://central.sonatype.com/artifact/io.cheqi/cheqi-sdk" >> $GITHUB_STEP_SUMMARY