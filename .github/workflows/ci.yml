name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: cheqi-sdk-java-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      - name: Check OpenAPI spec drift
        run: make spec-check ENV=prod

      - name: Verify generated models are committed
        run: |
          mvn -B -q generate-sources
          git diff --exit-code -I '^@javax\.annotation\.Generated' -- src/main/java/com/cheqi/sdk/models/generated

  test-and-build:
    name: Test and Build
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      - name: Run tests
        run: ./gradlew test --no-daemon --console=plain

      - name: Validate build and release artifacts
        run: ./gradlew clean build javadocJar sourcesJar publishToMavenLocal -x test --no-daemon --console=plain
